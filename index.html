<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>מתנות לרומי</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Varela+Round&family=Rubik:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg1:#F6DCD6;
    --bg2:#F0E7D8;
    --card:#FFFDF9;
    --ink:#4A3B34;
    --ink-soft:#8A7A6E;
    --blush:#E8918A;
    --sage:#8FA588;
    --tape:#F4D77E;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;}
  body{
    font-family:'Rubik', sans-serif;
    color:var(--ink);
  }

  .scroll-container{
    height:100vh;
    overflow-y:scroll;
    scroll-snap-type:y mandatory;
  }

  section{
    height:100vh;
    width:100%;
    scroll-snap-align:start;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    position:relative;
    padding:18px;
  }

  /* === עמוד 1: ברכה עם תמונת רקע === */
  #hero-section{
    background-image: linear-gradient(180deg, rgba(74,59,52,.15) 0%, rgba(74,59,52,.55) 100%), url('romi.jpg');
    background-size:cover;
    background-position:center;
    text-align:center;
  }
  #hero-section h1{
    font-family:'Varela Round', sans-serif;
    font-weight:400;
    font-size:34px;
    line-height:1.5;
    color:#fff;
    text-shadow:0 2px 12px rgba(0,0,0,.35);
    margin:0;
    max-width:340px;
  }
  .scroll-hint{
    position:absolute;
    bottom:34px;
    left:50%;
    transform:translateX(-50%);
    color:#fff;
    font-size:13px;
    opacity:.9;
    text-align:center;
    animation:bounce 1.8s infinite;
  }
  .scroll-hint span{display:block;font-size:20px;margin-top:2px;}
  @keyframes bounce{
    0%,100%{transform:translate(-50%,0);}
    50%{transform:translate(-50%,8px);}
  }

  /* === עמוד 2: הלוז === */
  #plan-section{
    background-image: linear-gradient(180deg, rgba(74,59,52,.35) 0%, rgba(74,59,52,.65) 100%), url('plan-bg.jpg');
    background-size:cover;
    background-position:center;
  }

  .plan-title{
    font-family:'Varela Round', sans-serif;
    font-weight:400;
    font-size:22px;
    text-align:center;
    margin:0 0 20px 0;
    color:#fff;
    text-shadow:0 2px 10px rgba(0,0,0,.35);
  }
  .plan-list{
    width:100%;
    max-width:390px;
  }
  .plan-row{
    display:flex;
    align-items:center;
    gap:16px;
    padding:18px 20px;
    margin:10px 0;
    border-radius:20px;
    box-shadow:0 12px 24px -12px rgba(0,0,0,.4);
    color:#fff;
  }
  .plan-icon{
    font-size:30px;
    line-height:1;
    filter:drop-shadow(0 2px 4px rgba(0,0,0,.25));
  }
  .plan-info{
    display:flex;
    flex-direction:column;
    gap:4px;
    flex:1;
  }
  .plan-text{
    font-size:16px;
    font-weight:500;
    text-shadow:0 1px 4px rgba(0,0,0,.25);
  }
  .plan-time{
    font-family:'Varela Round', sans-serif;
    font-size:13px;
    opacity:.9;
  }

  .theme-home{background:linear-gradient(135deg,#F2B79A,#E8918A);}
  .theme-pool{background:linear-gradient(135deg,#7FD1E0,#3E93B8);}
  .theme-spa{background:linear-gradient(135deg,#C7AEDE,#8F6FB0);}
  .theme-dinner{background:linear-gradient(135deg,#6B4A3A,#2E1F1A);}
</style>
</head>
<body id="index-page">
  <div class="scroll-container">
    <section id="hero-section">
      <h1>🎉 מזל טוב רומיק שלי 🎉</h1>
      <div class="scroll-hint">גללי למטה<span>⌄</span></div>
    </section>
    <section id="plan-section">
      <div class="plan-title">התכניות שלנו להיום</div>
      <div class="plan-list" id="plan-list"></div>
    </section>
  </div>
  <script src="plans.js"></script>
</body>
</html>
