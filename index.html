<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>מתנות לרומי</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Varela+Round&family=Rubik:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg1:#F6DCD6;
    --bg2:#F0E7D8;
    --card:#FFFDF9;
    --ink:#4A3B34;
    --ink-soft:#8A7A6E;
    --blush:#E8918A;
    --sage:#8FA588;
    --tape:#F4D77E;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    min-height:100vh;
    background: linear-gradient(160deg, var(--bg1) 0%, var(--bg2) 100%);
    font-family:'Rubik', sans-serif;
    color:var(--ink);
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:40px 18px 60px;
  }

  .hero{
    text-align:center;
    max-width:390px;
    width:100%;
    margin-bottom:8px;
  }
  .hero img{
    width:280px;
    max-width:100%;
    height:auto;
    display:block;
    margin:0 auto;
  }
  .hero h1{
    font-family:'Varela Round', sans-serif;
    font-weight:400;
    font-size:26px;
    line-height:1.5;
    color:var(--ink);
    margin:6px 0 8px 0;
  }
  .hero p{
    font-size:14px;
    color:var(--ink-soft);
    margin:0 0 6px 0;
  }

  .plan-title{
    font-family:'Varela Round', sans-serif;
    font-weight:400;
    font-size:19px;
    text-align:center;
    margin:26px 0 14px 0;
  }
  .plan-list{
    width:100%;
    max-width:390px;
  }
  .plan-row{
    display:flex;
    align-items:center;
    gap:14px;
    background:var(--card);
    padding:13px 20px;
    margin:8px 0;
    border-radius:100px;
    box-shadow:0 8px 18px -12px rgba(74,59,52,.35);
  }
  .plan-time{
    font-family:'Varela Round', sans-serif;
    font-size:14px;
    color:#fff;
    background:var(--blush);
    padding:4px 12px;
    border-radius:100px;
    min-width:44px;
    text-align:center;
  }
  .plan-text{
    font-size:15px;
    color:var(--ink);
  }

  .benefits-link{
    display:inline-block;
    margin-top:26px;
    font-size:14px;
    color:#fff;
    background:var(--sage);
    text-decoration:none;
    padding:11px 24px;
    border-radius:100px;
    box-shadow:0 8px 18px -12px rgba(74,59,52,.35);
  }
  .benefits-link:hover{opacity:.92;}
</style>
</head>
<body id="index-page">
  <div class="hero">
    <img src="celebration.gif" alt="חגיגה" loading="eager">
    <h1>🎉 יום הולדת שמח רומיק שלי 🎉</h1>
    <p>התוכנית להיום</p>
  </div>
  <div class="plan-list" id="plan-list"></div>
  <a class="benefits-link" href="benefits.html">🎁 ההטבות שלך</a>
  <script src="plans.js"></script>
</body>
</html>
